<svg xmlns="http://www.w3.org/2000/svg" width="900" height="860" viewBox="0 0 900 860" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <!-- Background -->
  <rect width="900" height="860" fill="#fafafa"/>

  <!-- Top header bar -->
  <rect width="900" height="60" fill="#1b1b1b"/>
  <text x="24" y="22" fill="white" font-size="20" font-weight="700" letter-spacing="-0.5">Swagger</text>
  <text x="96" y="22" fill="#85ea2d" font-size="20" font-weight="700">UI</text>
  <rect x="24" y="30" width="580" height="20" rx="4" fill="#3b3b3b"/>
  <text x="34" y="44" fill="#aaa" font-size="11">http://localhost:8000/openapi.json</text>
  <rect x="614" y="30" width="80" height="20" rx="4" fill="#85ea2d"/>
  <text x="627" y="44" fill="#1b1b1b" font-size="11" font-weight="600">Explore</text>

  <!-- API Title block -->
  <rect x="0" y="60" width="900" height="76" fill="#1b1b1b"/>
  <text x="24" y="93" fill="white" font-size="22" font-weight="700">LangGraph Agent API</text>
  <rect x="24" y="103" width="46" height="18" rx="9" fill="#89bf04"/>
  <text x="31" y="116" fill="white" font-size="10" font-weight="700">OAS 3</text>
  <text x="80" y="116" fill="#aaa" font-size="11">/openapi.json</text>
  <text x="24" y="128" fill="#b5b5b5" font-size="11">FastAPI serving layer for a LangGraph conversational agent with PostgreSQL persistence and Redis rate limiting.</text>

  <!-- ─── health section ─── -->
  <rect x="16" y="150" width="868" height="34" rx="4" fill="#f0f0f0" stroke="#d9d9d9" stroke-width="1"/>
  <text x="28" y="173" fill="#3b4151" font-size="14" font-weight="700">health</text>

  <!-- GET /health -->
  <rect x="16" y="192" width="868" height="44" rx="4" fill="#ebf3fb" stroke="#61affe" stroke-width="1"/>
  <rect x="16" y="192" width="80" height="44" rx="4 0 0 4" fill="#61affe"/>
  <text x="24" y="219" fill="white" font-size="12" font-weight="700">GET</text>
  <text x="110" y="212" fill="#3b4151" font-size="13" font-weight="600">/health</text>
  <text x="110" y="228" fill="#666" font-size="11">Check database and Redis connectivity</text>
  <text x="830" y="219" fill="#61affe" font-size="18">›</text>

  <!-- ─── threads section ─── -->
  <rect x="16" y="252" width="868" height="34" rx="4" fill="#f0f0f0" stroke="#d9d9d9" stroke-width="1"/>
  <text x="28" y="275" fill="#3b4151" font-size="14" font-weight="700">threads</text>

  <!-- POST /api/v1/threads -->
  <rect x="16" y="294" width="868" height="44" rx="4" fill="#e8f6f0" stroke="#49cc90" stroke-width="1"/>
  <rect x="16" y="294" width="80" height="44" rx="4 0 0 4" fill="#49cc90"/>
  <text x="20" y="321" fill="white" font-size="12" font-weight="700">POST</text>
  <text x="110" y="314" fill="#3b4151" font-size="13" font-weight="600">/api/v1/threads</text>
  <text x="110" y="330" fill="#666" font-size="11">Create a new conversation thread</text>
  <text x="830" y="321" fill="#49cc90" font-size="18">›</text>

  <!-- GET /api/v1/threads -->
  <rect x="16" y="346" width="868" height="44" rx="4" fill="#ebf3fb" stroke="#61affe" stroke-width="1"/>
  <rect x="16" y="346" width="80" height="44" rx="4 0 0 4" fill="#61affe"/>
  <text x="24" y="373" fill="white" font-size="12" font-weight="700">GET</text>
  <text x="110" y="366" fill="#3b4151" font-size="13" font-weight="600">/api/v1/threads</text>
  <text x="110" y="382" fill="#666" font-size="11">Return a paginated list of threads, newest first</text>
  <text x="830" y="373" fill="#61affe" font-size="18">›</text>

  <!-- GET /api/v1/threads/{thread_id} -->
  <rect x="16" y="398" width="868" height="44" rx="4" fill="#ebf3fb" stroke="#61affe" stroke-width="1"/>
  <rect x="16" y="398" width="80" height="44" rx="4 0 0 4" fill="#61affe"/>
  <text x="24" y="425" fill="white" font-size="12" font-weight="700">GET</text>
  <text x="110" y="418" fill="#3b4151" font-size="13" font-weight="600">/api/v1/threads/<tspan fill="#c05621">{thread_id}</tspan></text>
  <text x="110" y="434" fill="#666" font-size="11">Return thread metadata and full message history from LangGraph checkpoint</text>
  <text x="830" y="425" fill="#61affe" font-size="18">›</text>

  <!-- DELETE /api/v1/threads/{thread_id} -->
  <rect x="16" y="450" width="868" height="44" rx="4" fill="#fde8e8" stroke="#f93e3e" stroke-width="1"/>
  <rect x="16" y="450" width="80" height="44" rx="4 0 0 4" fill="#f93e3e"/>
  <text x="14" y="477" fill="white" font-size="11" font-weight="700">DELETE</text>
  <text x="110" y="470" fill="#3b4151" font-size="13" font-weight="600">/api/v1/threads/<tspan fill="#c05621">{thread_id}</tspan></text>
  <text x="110" y="486" fill="#666" font-size="11">Delete a thread and its checkpoint data</text>
  <text x="830" y="477" fill="#f93e3e" font-size="18">›</text>

  <!-- POST /api/v1/threads/{thread_id}/messages -->
  <rect x="16" y="502" width="868" height="44" rx="4" fill="#e8f6f0" stroke="#49cc90" stroke-width="1"/>
  <rect x="16" y="502" width="80" height="44" rx="4 0 0 4" fill="#49cc90"/>
  <text x="20" y="529" fill="white" font-size="12" font-weight="700">POST</text>
  <text x="110" y="522" fill="#3b4151" font-size="13" font-weight="600">/api/v1/threads/<tspan fill="#c05621">{thread_id}</tspan>/messages</text>
  <text x="110" y="538" fill="#666" font-size="11">Send a user message and receive the agent response (Redis-cached)</text>
  <text x="830" y="529" fill="#49cc90" font-size="18">›</text>

  <!-- ─── Schemas section ─── -->
  <rect x="16" y="562" width="868" height="34" rx="4" fill="#f0f0f0" stroke="#d9d9d9" stroke-width="1"/>
  <text x="28" y="585" fill="#3b4151" font-size="14" font-weight="700">Schemas</text>
  <text x="830" y="585" fill="#3b4151" font-size="18">›</text>

  <!-- Schema pills -->
  <rect x="28" y="606" width="124" height="24" rx="4" fill="#fff" stroke="#d9d9d9" stroke-width="1"/>
  <text x="38" y="622" fill="#3b4151" font-size="11">CreateThreadRequest</text>

  <rect x="162" y="606" width="134" height="24" rx="4" fill="#fff" stroke="#d9d9d9" stroke-width="1"/>
  <text x="172" y="622" fill="#3b4151" font-size="11">SendMessageRequest</text>

  <rect x="306" y="606" width="108" height="24" rx="4" fill="#fff" stroke="#d9d9d9" stroke-width="1"/>
  <text x="316" y="622" fill="#3b4151" font-size="11">SendMessageResponse</text>

  <rect x="424" y="606" width="96" height="24" rx="4" fill="#fff" stroke="#d9d9d9" stroke-width="1"/>
  <text x="434" y="622" fill="#3b4151" font-size="11">ThreadResponse</text>

  <rect x="530" y="606" width="114" height="24" rx="4" fill="#fff" stroke="#d9d9d9" stroke-width="1"/>
  <text x="540" y="622" fill="#3b4151" font-size="11">ThreadDetailResponse</text>

  <rect x="654" y="606" width="148" height="24" rx="4" fill="#fff" stroke="#d9d9d9" stroke-width="1"/>
  <text x="664" y="622" fill="#3b4151" font-size="11">PaginatedThreadsResponse</text>

  <rect x="28" y="640" width="64" height="24" rx="4" fill="#fff" stroke="#d9d9d9" stroke-width="1"/>
  <text x="38" y="656" fill="#3b4151" font-size="11">MessageOut</text>

  <rect x="102" y="640" width="92" height="24" rx="4" fill="#fff" stroke="#d9d9d9" stroke-width="1"/>
  <text x="112" y="656" fill="#3b4151" font-size="11">HealthResponse</text>

  <!-- ─── Rate Limit info box ─── -->
  <rect x="16" y="682" width="868" height="60" rx="6" fill="#fff8e1" stroke="#f9a825" stroke-width="1"/>
  <text x="28" y="703" fill="#b45309" font-size="12" font-weight="600">Rate Limiting</text>
  <text x="28" y="720" fill="#78350f" font-size="11">All /api/v1/* endpoints are protected by a sliding-window rate limiter (Redis ZSET, Lua atomic script).</text>
  <text x="28" y="735" fill="#78350f" font-size="11">Default: 60 requests / 60 seconds per IP. Returns HTTP 429 with Retry-After: 60 when exceeded.</text>

  <!-- ─── Persistence info box ─── -->
  <rect x="16" y="752" width="430" height="76" rx="6" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
  <text x="28" y="773" fill="#0369a1" font-size="12" font-weight="600">Persistence</text>
  <text x="28" y="790" fill="#0c4a6e" font-size="11">Thread metadata → PostgreSQL (SQLAlchemy ORM + Alembic)</text>
  <text x="28" y="806" fill="#0c4a6e" font-size="11">Message history → LangGraph AsyncPostgresSaver (checkpoint tables)</text>
  <text x="28" y="822" fill="#0c4a6e" font-size="11">Response cache → Redis SETEX with SHA-256 keyed TTL</text>

  <!-- ─── Auth info box ─── -->
  <rect x="456" y="752" width="428" height="76" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="468" y="773" fill="#15803d" font-size="12" font-weight="600">Request Tracing</text>
  <text x="468" y="790" fill="#14532d" font-size="11">Every request gets a unique X-Request-ID header (generated or</text>
  <text x="468" y="806" fill="#14532d" font-size="11">forwarded from client). Echoed in the response. Structured JSON</text>
  <text x="468" y="822" fill="#14532d" font-size="11">access logs include method, path, status, duration_ms, client_ip.</text>
</svg>
